<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LifeDash</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}

/* Tabs */
.tab-content {
  display: none;
  padding: 20px;
}
.tab-content.active {
  display: block;
}

/* Cards */
.card {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin: 15px auto;
  max-width: 600px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* Buttons */
button.primary {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* Chat */
.chat-box {
  height: 300px;
  overflow-y: auto;
  background: white;
  border-radius: 20px;
  padding: 10px;
}

.message {
  padding: 10px;
  margin: 8px;
  border-radius: 12px;
  max-width: 70%;
}

.user {
  background: #2563eb;
  color: white;
  margin-left: auto;
}

.bot {
  background: #eee;
}

/* Tab bar */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 70px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 1px solid #ddd;
}

.tab-bar button {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
}

#moodButtons {
  display: flex;
  justify-content: space-around;
  font-size: 30px;
  margin-top: 10px;
} 
#moodButtons button {
  font-size: 30px;
  background: none;
  border: none;
  cursor: pointer;
  transition: transform: 0.2s;
}

#moodButtons button:hover{
  transform: scale(1.3);
}
.fade-out {
  opacity: 0;
  transition: opacity 0.5s ease;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="tab-content active">
  <div class="card">
    <h2>LifeDash Dashboard</h2>
    <p>Everything in one place.</p>
  </div>

  <div class="card">
    <h3>Quick Stats</h3>
    <p id="stats"></p>
  </div>
<div class="card">
  <h3>How are you feeling today?</h3>
  <div id="moodButtons">
    <button onclick = "setmood('happy')">😁</button>
    <button onclick = "setmood('meh')">🫤</button>
    <button onclick = "setmood('sad')">😢</button>
    <buton onclick = "setmood('angry')">😡</buton>

  </div> 
    <div id= "moodresponse"></p>
    </div>
</div>

<!-- TODO -->
<div id="todo" class="tab-content">
  <div class="card">
    <h2>To-Do</h2>
    <input id="todoInput" placeholder="Add task">
    <button class="primary" onclick="addTodo()">Add</button>
    <ul id="todoList"></ul>
  </div>
</div>

<!-- JOURNAL -->
<div id="journal" class="tab-content">
  <div class="card">
    <h2>Journal</h2>
    <input type="date" id="journalDate">
    <textarea id="journalText" placeholder="Write something..."></textarea>
    <button class="primary" onclick="saveJournal()">Save</button>
  </div>
  <div id="journalEntries"></div>
</div>

<!-- SHINEBOT -->
<div id="shinebot" class="tab-content">
  <div class="card">
    <h2>ShineBot 🤖</h2>

    <div class="chat-box" id="chatBox"></div>

    <input id="chatInput" placeholder="Talk to ShineBot...">
    <button class="primary" onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- FLAGS -->
<div id="flags" class="tab-content">
  <div class="card">
    <h2>Flags 🚩</h2>
    <div id="flagsarea"></div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button onclick="switchTab('home')">🏠</button>
  <button onclick="switchTab('todo')">📝</button>
  <button onclick="switchTab('journal')">📖</button>
  <button onclick="switchTab('shinebot')">🤖</button>
  <button onclick="switchTab('flags')">🚩</button>
</div>

<script>
let DEV_MODE = false;
/* NAVIGATION */
function switchTab(tab) {
  document.querySelectorAll('.tab-content')
    .forEach(t => t.classList.remove('active'));

  const el = document.getElementById(tab);
  if (el) el.classList.add('active');
}

/* ---------------- TODO ---------------- */
function addTodo() {
  const input = document.getElementById("todoInput");
  let todos = JSON.parse(localStorage.getItem("todos") || "[]");

  todos.push(input.value);
  localStorage.setItem("todos", JSON.stringify(todos));

  input.value = "";
  loadTodos();
}

function loadTodos() {
  const list = document.getElementById("todoList");
  list.innerHTML = "";

  let todos = JSON.parse(localStorage.getItem("todos") || "[]");

  todos.forEach((t, i) => {
    let li = document.createElement("li");
    li.textContent = t;

    li.onclick = () => {
      todos.splice(i,1);
      localStorage.setItem("todos", JSON.stringify(todos));
      loadTodos();
    };

    list.appendChild(li);
  });
}

/* ---------------- JOURNAL ---------------- */
function saveJournal() {
  let entries = JSON.parse(localStorage.getItem("journal") || "[]");

  entries.push({
    date: document.getElementById("journalDate").value,
    text: document.getElementById("journalText").value
  });

  localStorage.setItem("journal", JSON.stringify(entries));
  loadJournal();
}

function loadJournal() {
  const container = document.getElementById("journalEntries");
  container.innerHTML = "";

  let entries = JSON.parse(localStorage.getItem("journal") || "[]");

  entries.reverse().forEach(e => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<strong>${e.date}</strong><p>${e.text}</p>`;
    container.appendChild(div);
  });
}

/* ---------------- SHINEBOT ---------------- */

function addMessage(text, type) {
  const box = document.getElementById("chatBox");

  let msg = document.createElement("div");
  msg.className = "message " + type;
  msg.textContent = text;

  box.appendChild(msg);
  box.scrollTop = box.scrollHeight;
}

function analyze(msg) {
  msg = msg.toLowerCase();

  let score = 0;

  // stronger weighting system
  if (msg.includes("hurt")) score += 3;
  if (msg.includes("kill")) score += 4;
  if (msg.includes("worthless")) score += 2;
  if (msg.includes("sad")) score += 1;
  if (msg.includes("stress")) score += 1;

  if (score >= 4) return "danger";
  if (score >= 2) return "concern";

  return "normal";
}

function logFlag(level, message) {
  let flags = JSON.parse(localStorage.getItem("flags") || "[]");

  flags.push({
    time: new Date().toISOString(),
    level,
    message
  });

  localStorage.setItem("flags", JSON.stringify(flags));
  loadFlags();
}
function botReply(level, text) {
  if (level === "danger") {
    logFlag(level, text);
    return "I'm really glad you told me. Please talk to a trusted adult right now.";
  }

  if (level === "concern") {
    logFlag(level, text);
    return "That sounds tough. Want to talk more about it?";
  }

  return "I'm here for you. What's going on?";
}

function sendMessage() {
  const input = document.getElementById("chatInput");
  const text = input.value;
  if (!text) return;

  addMessage(text, "user");

  const level = analyze(text);
  const reply = botReply(level, text);

  setTimeout(() => addMessage(reply, "bot"), 400);

  input.value = "";
}

/* ---------------- FLAGS ---------------- */

function loadFlags() {
  const container = document.getElementById("flagsarea");
  container.innerHTML = "";

  let flags = JSON.parse(localStorage.getItem("flags") || "[]");

  if (flags.length === 0) {
    container.innerHTML = "<p>No flags yet 🎉</p>";
    return;
  }

  flags.reverse().forEach((flag, index) => {
    let div = document.createElement("div");
    div.className = "card";

    let color = "#999";
    if (flag.level === "danger") color = "#ef4444";
    if (flag.level === "concern") color = "#f59e0b";

    div.innerHTML = `
      <strong style="color:${color}">
        ${flag.level.toUpperCase()}
      </strong>
      <p>${flag.message}</p>
      <small>${new Date(flag.time).toLocaleString()}</small>
    `;

    // DEV MODE controls
    if (DEV_MODE) {
      let btn = document.createElement("button");
      btn.textContent = "Delete";
      btn.onclick = () => {
        flags.splice(flags.length - 1 - index, 1);
        localStorage.setItem("flags", JSON.stringify(flags));
        loadFlags();
      };
      div.appendChild(btn);
    }

    container.appendChild(div);
  });
}
  function enterDevMode() {
  const password = prompt("Enter dev password:");

  // simple hash-like check (NOT real security, just for local testing)
  if (password === "lifedash-dev-2026") {
    DEV_MODE = true;
    alert("Dev Mode Enabled");
    loadFlags();
  } else {
    alert("Wrong password");
  }
}
  function updateStats() {
  let todos = JSON.parse(localStorage.getItem("todos") || "[]");
  let flags = JSON.parse(localStorage.getItem("flags") || "[]");
  let journal = JSON.parse(localStorage.getItem("journal") || "[]");

  document.getElementById("stats").innerHTML = `
    Tasks: ${todos.length}<br>
    Journal Entries: ${journal.length}<br>
    Flags: ${flags.length}
  `;
}
  function setMood(mood) {
  const buttons = document.getElementById("moodButtons");
  const response = document.getElementById("moodResponse");

  let message = "";

  if (mood === "happy") message = "yaay! 😄";
  if (mood === "meh") message = "got it 🙂";
  if (mood === "sad") message = "ooh no :( 💙";
  if (mood === "angry") message = "take a breath 🫶";

  // show response
  response.textContent = message;

  // save mood
  localStorage.setItem("todayMood", mood);

  // fade buttons out
  buttons.classList.add("fade-out");

  // optional: remove after fade
  setTimeout(() => {
    buttons.style.display = "none";
  }, 500);
}
function loadMood() {
  const mood = localStorage.getItem("todayMood");
  if (!mood) return;

  const response = document.getElementById("moodResponse");
  const buttons = document.getElementById("moodButtons");

  let message = "";

  if (mood === "happy") message = "yaay! 😄";
  if (mood === "meh") message = "got it 🙂";
  if (mood === "sad") message = "ooh no :( 💙";
  if (mood === "angry") message = "take a breath 🫶";

  response.textContent = message;
  buttons.style.display = "none";
}

/* INIT */
loadTodos();
loadJournal();
loadFlags();
updatestats();
loadMood();
</script>

</body>
</html>
