<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeDash</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}

/* Tabs */
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

/* Cards */
.card {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin: 15px auto;
  max-width: 600px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* Bottom Tab Bar */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 70px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 1px solid #ddd;
}

.tab-bar button {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* Buttons */
button.primary {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* Chat */
.chat-box {
  height: 300px;
  overflow-y: auto;
  background: white;
  border-radius: 20px;
  padding: 10px;
}

.message {
  padding: 10px;
  margin: 8px;
  border-radius: 12px;
  max-width: 70%;
}

.user {
  background: #2563eb;
  color: white;
  margin-left: auto;
}

.bot {
  background: #eee;
}

.chat-input {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.chat-input input { flex: 1; }

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="tab-content active">
  <div class="card">
    <h2>Welcome to LifeDash</h2>
    <p>Your all-in-one productivity and wellness dashboard.</p>
  </div>
</div>

<!-- TODO -->
<div id="todo" class="tab-content">
  <div class="card">
    <h2>To-Do</h2>
    <input id="todoInput" placeholder="Add task">
    <button class="primary" onclick="addTodo()">Add</button>
    <ul id="todoList"></ul>
  </div>
</div>

<!-- JOURNAL -->
<div id="journal" class="tab-content">
  <div class="card">
    <h2>Journal</h2>
    <input type="date" id="journalDate">
    <textarea id="journalText" placeholder="Write..."></textarea>
    <button class="primary" onclick="saveJournal()">Save</button>
  </div>
  <div id="journalEntries"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="tab-content">
  <div class="card">
    <h2>Calendar</h2>
    <input type="date" id="calendarDate">
    <input id="calendarEvent" placeholder="Event">
    <button class="primary" onclick="saveEvent()">Save</button>
    <div id="eventList"></div>
  </div>
</div>

<!-- SHINEBOT -->
<div id="shinebot" class="tab-content">
  <div class="card">
    <h2>ShineBot 🤖</h2>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
      <input id="chatInput" placeholder="Talk to ShineBot...">
      <button class="primary" onclick="sendMessage()">Send</button>
    </div>

  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button onclick="switchTab('home')">🏠</button>
  <button onclick="switchTab('todo')">📝</button>
  <button onclick="switchTab('journal')">📖</button>
  <button onclick="switchTab('calendar')">📅</button>
  <button onclick="switchTab('shinebot')">🤖</button>
</div>

<script>

/* TAB SWITCHING */
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

/* TODO */
function addTodo() {
  const val = document.getElementById("todoInput").value;
  if (!val) return;

  let todos = JSON.parse(localStorage.getItem("todos") || "[]");
  todos.push(val);
  localStorage.setItem("todos", JSON.stringify(todos));

  loadTodos();
}

function loadTodos() {
  const list = document.getElementById("todoList");
  list.innerHTML = "";

  let todos = JSON.parse(localStorage.getItem("todos") || "[]");
  todos.forEach((t, i) => {
    let li = document.createElement("li");
    li.textContent = t;
    li.onclick = () => {
      todos.splice(i,1);
      localStorage.setItem("todos", JSON.stringify(todos));
      loadTodos();
    };
    list.appendChild(li);
  });
}

/* JOURNAL */
function saveJournal() {
  const date = document.getElementById("journalDate").value;
  const text = document.getElementById("journalText").value;

  let entries = JSON.parse(localStorage.getItem("journal") || "[]");
  entries.push({date, text});
  localStorage.setItem("journal", JSON.stringify(entries));

  loadJournal();
}

function loadJournal() {
  const container = document.getElementById("journalEntries");
  container.innerHTML = "";

  let entries = JSON.parse(localStorage.getItem("journal") || "[]");

  entries.reverse().forEach(e => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<strong>${e.date}</strong><p>${e.text}</p>`;
    container.appendChild(div);
  });
}

/* CALENDAR */
function saveEvent() {
  const date = document.getElementById("calendarDate").value;
  const text = document.getElementById("calendarEvent").value;

  let events = JSON.parse(localStorage.getItem("events") || "{}");
  events[date] = text;
  localStorage.setItem("events", JSON.stringify(events));

  loadEvents();
}

function loadEvents() {
  const container = document.getElementById("eventList");
  container.innerHTML = "";

  let events = JSON.parse(localStorage.getItem("events") || "{}");

  for (let d in events) {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<strong>${d}</strong><p>${events[d]}</p>`;
    container.appendChild(div);
  }
}

/* SHINEBOT */

function addMessage(text, type) {
  const box = document.getElementById("chatBox");
  const msg = document.createElement("div");
  msg.className = "message " + type;
  msg.textContent = text;
  box.appendChild(msg);
  box.scrollTop = box.scrollHeight;
}

function analyze(msg) {
  msg = msg.toLowerCase();

  if (msg.includes("hurt") || msg.includes("kill")) return "danger";
  if (msg.includes("sad") || msg.includes("stress")) return "concern";
  return "normal";
}

function logFlag(level) {
  let flags = JSON.parse(localStorage.getItem("flags") || "[]");
  flags.push({time: new Date(), level});
  localStorage.setItem("flags", JSON.stringify(flags));
}

function botReply(level) {
  if (level === "danger") {
    logFlag(level);
    return "I'm really glad you told me. Please talk to a trusted adult right now.";
  }

  if (level === "concern") {
    return "That sounds tough. Want to talk more about it?";
  }

  return "I'm here to help. What's going on?";
}

function sendMessage() {
  const input = document.getElementById("chatInput");
  const text = input.value;
  if (!text) return;

  addMessage(text, "user");

  const level = analyze(text);
  const reply = botReply(level);

  setTimeout(() => addMessage(reply, "bot"), 400);

  input.value = "";
}

/* LOAD */
loadTodos();
loadJournal();
loadEvents();

</script>

</body>
</html>
